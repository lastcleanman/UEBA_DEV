version: '3.8'
services:
  # 1. IAM 및 자산 정보 저장용 (PostgreSQL / 15 -> 16-alpine)
  postgres:
    image: postgres:16-alpine
    container_name: ueba-postgres
    environment:
      - POSTGRES_USER=admin          # 개별 로컬이라 별도의 ID 생성도 가능하지만 통일성을 위해 admin 으로 지정
      - POSTGRES_PASSWORD=Suju!0901  # 기본 패스워드는 Suju!0901 로 통일
      - POSTGRES_DB=ueba_db
    ports:
      - "5433:5432"                  # 일반적으로 PostgreSQL의 Port 는 5432를 사용하지만 중복 포트 충돌 방지를 위해 외부포트를 5433으로 변경
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - ueba-network                 # Docker 재 실행시 내부 IP 변경에도 대응할 수 있도록 같은 Network 대역으로 묶어서 활용

  # 2. 대용량 로그 검색 및 분석용 (Elasticsearch / 8.10.2 -> 8.17.0 )
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: ueba-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false      # 로컬 개발 편의성을 위해 SSL / 인증 보안 해제 ( HTTP 통신 )
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"  # 초기 개발용 메모리 제한
    ports:
      - "9200:9200"
    volumes:
      - ./data/elasticsearch:/usr/share/elasticsearch/data
    networks:
      - ueba-network

  # 3. 분산 데이터 처리 엔진 (PySpark 3.4.1 -> 3.5.3)
  spark:
    image: apache/spark:3.5.3
    container_name: ueba-spark
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no

    # 컨테이너 실행 시 Spark Master를 명시적으로 실행하여 프로세스 종료 방지
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080" # Spark Master Web UI ( 사람이 웹 브라우저 상태로 확인하는 용도 )
      - "7077:7077" # Spark Master RPC Port ( 프로그램 / 코드가 데이터 처리를 요청하는 용도 )
    volumes:
      - ./apps:/opt/spark/apps  # 로컬에서 작성한 분석 코드 ( .py) 연동
      - ./data:/opt/spark/data  # 분석에 필요한 데이터 파일 저장소
      - ./tenants:/UEBA/tenants # ✅ 추가: 테넌트 데이터/모델/아티팩트 접근
    networks:
      - ueba-network

  # 4. Backend API (FastAPI / Python 3.10 -> 3.12-slim)
  backend:
    build: ./backend
    container_name: ueba-backend
    working_dir: /app
    command: python3 -m app.main
    volumes:
      - ./backend:/app
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ./tenants:/UEBA/tenants          # ✅ 추가: 테넌트 저장소(로그/모델/설정/아티팩트)
      - ./license.yaml:/UEBA/license.yaml:ro  # ✅ 추가: 라이선스 파일(읽기전용 권장)
    ports:
      - "8000:8000"
      - "5514:5514/udp"
    environment:
      - PYTHONPATH=/app
    networks:
      - ueba-network

  # 5. Frontend (Vue.js / Node 18 -> 20-alpine)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ueba-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules # 호스트의 node_modules와 충돌 방지 (중요)
      - ./license.yaml:/UEBA/license.yaml:ro 
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true  # WSL/Docker 환경에서 파일 변경 감지 보장
    stdin_open: true              # Vite 개발 서버 안정성을 위해 추가
    tty: true                     # 터미널(Teletypewriter: TTY)을 할당
    depends_on:
      - backend
    networks:
      - ueba-network

  # 6. Elasticsearch 관리 및 시각화 도구 ( KIBANA / 8.10.2 -> 8.17.0)
  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: ueba-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://ueba-elasticsearch:9200
    ports:
      - "5601:5601" # 웹 브라우저에서 http://localhost:5601 로 접속
    networks:
      - ueba-network
    depends_on:
      - elasticsearch

# 서비스 간 컨테이너 이름으로 통신하기 위한 전용 네트워크 설정
networks:
  ueba-network:
    driver: bridge

  